server:
  port: 8080

spring:
  application:
    name: scheduler
  datasource:
    url: jdbc:postgresql://localhost:5432/scheduler_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:ToJestTymczasowySekretDoRozwojuAplikacjiLokalnieWymienGoNaProdukcji}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

otp:
  ttl-minutes: ${OTP_TTL_MINUTES:5}
  max-attempts: ${OTP_MAX_ATTEMPTS:3}
  rate-window-minutes: ${OTP_RATE_WINDOW_MINUTES:5}

r2:
  endpoint: ${R2_ENDPOINT:http://localhost:9000}
  access-key: ${R2_ACCESS_KEY:minioadmin}
  secret-key: ${R2_SECRET_KEY:minioadmin}
  bucket-name: ${R2_BUCKET_NAME:scheduler}
  public-url: ${R2_PUBLIC_URL:http://localhost:9000/scheduler}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
